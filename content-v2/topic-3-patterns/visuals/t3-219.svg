  <circle cx="170" cy="90" r="16" fill="#DDA0DD" stroke="#333" stroke-width="1.5"/>
  <text x="170" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#333">?</text>
  <text x="100" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#D2B4DE">4</text>
