<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#f0f4f8" rx="12"/>
  <text x="100" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#333">Math Challenge</text>
  <circle cx="30" cy="90" r="16" fill="#F9E79F" stroke="#333" stroke-width="1.5"/>
  <text x="30" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#333">+</text>
  <circle cx="65" cy="90" r="16" fill="#F1948A" stroke="#333" stroke-width="1.5"/>
