<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- (i) Open curve with crossing -->
  <path d="M 10,60 C 30,20 50,100 70,60" fill="none" stroke="#333" stroke-width="2"/>
  <text x="30" y="110" font-size="11" fill="#555" font-family="Arial">(i)</text>
  <!-- (ii) Circle - closed -->
  <circle cx="120" cy="60" r="30" fill="none" stroke="#333" stroke-width="2"/>
  <text x="110" y="110" font-size="11" fill="#555" font-family="Arial">(ii)</text>
  <!-- (iii) Figure-8 open -->
  <path d="M 170,30 C 190,30 200,50 190,60 C 180,70 190,90 210,90" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="170" y1="30" x2="172" y2="28" stroke="#333" stroke-width="2"/>
  <text x="180" y="110" font-size="11" fill="#555" font-family="Arial">(iii)</text>
  <!-- (iv) Triangle with extra segment - not polygon -->
  <polygon points="250,30 280,90 220,90" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="250" y1="30" x2="250" y2="5" stroke="#333" stroke-width="2"/>
  <text x="240" y="110" font-size="11" fill="#555" font-family="Arial">(iv)</text>
  <!-- (v) Wavy open curve -->
  <path d="M 310,40 C 320,20 340,80 360,40 C 370,20 380,60 390,80" fill="none" stroke="#333" stroke-width="2"/>
  <text x="340" y="110" font-size="11" fill="#555" font-family="Arial">(v)</text>
</svg>
