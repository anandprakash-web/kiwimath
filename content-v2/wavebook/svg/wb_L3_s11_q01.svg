<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Grid 6x4 -->
  <g stroke="#999" stroke-width="0.5" fill="none">
    <!-- Vertical lines -->
    <line x1="80" y1="60" x2="80" y2="260"/>
    <line x1="130" y1="60" x2="130" y2="260"/>
    <line x1="180" y1="60" x2="180" y2="260"/>
    <line x1="230" y1="60" x2="230" y2="260"/>
    <line x1="280" y1="60" x2="280" y2="260"/>
    <line x1="330" y1="60" x2="330" y2="260"/>
    <line x1="380" y1="60" x2="380" y2="260"/>
    <!-- Horizontal lines -->
    <line x1="80" y1="60" x2="380" y2="60"/>
    <line x1="80" y1="110" x2="380" y2="110"/>
    <line x1="80" y1="160" x2="380" y2="160"/>
    <line x1="80" y1="210" x2="380" y2="210"/>
    <line x1="80" y1="260" x2="380" y2="260"/>
  </g>
  <!-- Outer border -->
  <rect x="80" y="60" width="300" height="200" fill="none" stroke="black" stroke-width="2"/>
  <!-- Column numbers -->
  <text x="105" y="50" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">1</text>
  <text x="155" y="50" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">2</text>
  <text x="205" y="50" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">3</text>
  <text x="255" y="50" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">4</text>
  <text x="305" y="50" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">5</text>
  <text x="355" y="50" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">6</text>
  <!-- Row numbers -->
  <text x="65" y="90" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">1</text>
  <text x="65" y="140" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">2</text>
  <text x="65" y="190" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">3</text>
  <text x="65" y="240" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">4</text>
  <!-- Label -->
  <text x="230" y="290" text-anchor="middle" font-family="Arial" font-size="13" fill="black">Each square = 1 cm²</text>
</svg>
