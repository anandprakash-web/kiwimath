<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Grid 7x5 -->
  <g stroke="#ccc" stroke-width="0.5">
    <!-- Vertical lines -->
    <line x1="50" y1="40" x2="50" y2="240"/>
    <line x1="90" y1="40" x2="90" y2="240"/>
    <line x1="130" y1="40" x2="130" y2="240"/>
    <line x1="170" y1="40" x2="170" y2="240"/>
    <line x1="210" y1="40" x2="210" y2="240"/>
    <line x1="250" y1="40" x2="250" y2="240"/>
    <line x1="290" y1="40" x2="290" y2="240"/>
    <line x1="330" y1="40" x2="330" y2="240"/>
    <!-- Horizontal lines -->
    <line x1="50" y1="40" x2="330" y2="40"/>
    <line x1="50" y1="80" x2="330" y2="80"/>
    <line x1="50" y1="120" x2="330" y2="120"/>
    <line x1="50" y1="160" x2="330" y2="160"/>
    <line x1="50" y1="200" x2="330" y2="200"/>
    <line x1="50" y1="240" x2="330" y2="240"/>
  </g>
  <!-- Outer border -->
  <rect x="50" y="40" width="280" height="200" fill="none" stroke="black" stroke-width="2"/>
  <!-- L-shaped shading (21 squares) -->
  <!-- Bottom 3 rows, columns 1-3 = 9 squares -->
  <rect x="50" y="120" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="90" y="120" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="130" y="120" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="50" y="160" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="90" y="160" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="130" y="160" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="50" y="200" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="90" y="200" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="130" y="200" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <!-- Bottom 3 rows, columns 4-7 only bottom 2 rows = 8 squares -->
  <rect x="170" y="160" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="210" y="160" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="250" y="160" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="290" y="160" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="170" y="200" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="210" y="200" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="250" y="200" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="290" y="200" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <!-- Extra 4 in top area: row 2, cols 1-4 -->
  <rect x="50" y="80" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="90" y="80" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="130" y="80" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <rect x="170" y="80" width="40" height="40" fill="#ADD8E6" stroke="#999" stroke-width="0.5"/>
  <!-- Label -->
  <text x="190" y="275" text-anchor="middle" font-family="Arial" font-size="13" fill="black">Each square = 1 m²</text>
  <text x="190" y="292" text-anchor="middle" font-family="Arial" font-size="12" fill="blue">Shaded area = 21 m²</text>
</svg>
