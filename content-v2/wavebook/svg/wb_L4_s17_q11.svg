<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <!-- Rectangle ABCD -->
  <rect x="30" y="20" width="180" height="120" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Diagonals -->
  <line x1="30" y1="20" x2="210" y2="140" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="210" y1="20" x2="30" y2="140" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Center O -->
  <circle cx="120" cy="80" r="3" fill="#e63946"/>
  <text x="124" y="74" font-size="12" fill="#e63946" font-family="Arial">O</text>
  <!-- OA label -->
  <text x="65" y="45" font-size="11" fill="#2a6" font-family="Arial">2x+4</text>
  <!-- OD label -->
  <text x="55" y="118" font-size="11" fill="#2a6" font-family="Arial">3x+1</text>
  <!-- Vertex labels -->
  <text x="18" y="16" font-size="12" fill="#333" font-family="Arial">A</text>
  <text x="212" y="16" font-size="12" fill="#333" font-family="Arial">B</text>
  <text x="212" y="152" font-size="12" fill="#333" font-family="Arial">C</text>
  <text x="18" y="152" font-size="12" fill="#333" font-family="Arial">D</text>
</svg>
