<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- (a) closed oval -->
  <ellipse cx="35" cy="45" rx="25" ry="18" fill="none" stroke="#333" stroke-width="2"/>
  <text x="25" y="80" font-size="11" fill="#555" font-family="Arial">(a)</text>
  <!-- (b) open wavy line -->
  <path d="M 75,30 C 85,50 95,20 105,50 C 115,80 125,30 135,50" fill="none" stroke="#333" stroke-width="2"/>
  <text x="95" y="80" font-size="11" fill="#555" font-family="Arial">(b)</text>
  <!-- (c) closed triangle -->
  <polygon points="170,25 195,65 145,65" fill="none" stroke="#333" stroke-width="2"/>
  <text x="160" y="80" font-size="11" fill="#555" font-family="Arial">(c)</text>
  <!-- (p) open spiral -->
  <path d="M 225,50 C 230,30 250,30 250,50 C 250,70 225,70 225,55" fill="none" stroke="#333" stroke-width="2"/>
  <text x="230" y="80" font-size="11" fill="#555" font-family="Arial">(p)</text>
  <!-- (q) closed rectangle -->
  <rect x="275" y="30" width="35" height="30" fill="none" stroke="#333" stroke-width="2"/>
  <text x="285" y="80" font-size="11" fill="#555" font-family="Arial">(q)</text>
  <!-- (r) open curve -->
  <path d="M 340,55 C 350,25 370,25 375,45" fill="none" stroke="#333" stroke-width="2"/>
  <text x="350" y="80" font-size="11" fill="#555" font-family="Arial">(r)</text>
</svg>
