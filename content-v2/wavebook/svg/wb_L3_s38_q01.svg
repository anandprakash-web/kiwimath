<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="250" y="25" text-anchor="middle" font-family="Arial" font-size="14" fill="black" font-weight="bold">Family Fun Day - Sports Participation</text>
  <!-- Y-axis -->
  <line x1="80" y1="50" x2="80" y2="280" stroke="black" stroke-width="1.5"/>
  <!-- X-axis -->
  <line x1="80" y1="280" x2="460" y2="280" stroke="black" stroke-width="1.5"/>
  <!-- Y-axis labels -->
  <text x="70" y="280" text-anchor="end" font-family="Arial" font-size="11" fill="black">0</text>
  <text x="70" y="234" text-anchor="end" font-family="Arial" font-size="11" fill="black">5</text>
  <text x="70" y="188" text-anchor="end" font-family="Arial" font-size="11" fill="black">10</text>
  <text x="70" y="142" text-anchor="end" font-family="Arial" font-size="11" fill="black">15</text>
  <text x="70" y="96" text-anchor="end" font-family="Arial" font-size="11" fill="black">20</text>
  <text x="70" y="50" text-anchor="end" font-family="Arial" font-size="11" fill="black">25</text>
  <!-- Grid lines -->
  <g stroke="#eee" stroke-width="0.5">
    <line x1="80" y1="234" x2="460" y2="234"/>
    <line x1="80" y1="188" x2="460" y2="188"/>
    <line x1="80" y1="142" x2="460" y2="142"/>
    <line x1="80" y1="96" x2="460" y2="96"/>
    <line x1="80" y1="50" x2="460" y2="50"/>
  </g>
  <!-- Volleyball: Adults=20, Children=10 -->
  <rect x="100" y="96" width="30" height="184" fill="#4488cc"/>
  <rect x="135" y="188" width="30" height="92" fill="#cc4444"/>
  <text x="132" y="298" text-anchor="middle" font-family="Arial" font-size="11" fill="black">Volleyball</text>
  <!-- Basketball: Adults=15, Children=15 -->
  <rect x="195" y="142" width="30" height="138" fill="#4488cc"/>
  <rect x="230" y="142" width="30" height="138" fill="#cc4444"/>
  <text x="227" y="298" text-anchor="middle" font-family="Arial" font-size="11" fill="black">Basketball</text>
  <!-- Table Tennis: Adults=25, Children=20 -->
  <rect x="290" y="50" width="30" height="230" fill="#4488cc"/>
  <rect x="325" y="96" width="30" height="184" fill="#cc4444"/>
  <text x="317" y="298" text-anchor="middle" font-family="Arial" font-size="11" fill="black">Table Tennis</text>
  <!-- Badminton: Adults=20, Children=25 -->
  <rect x="385" y="96" width="30" height="184" fill="#4488cc"/>
  <rect x="420" y="50" width="30" height="230" fill="#cc4444"/>
  <text x="417" y="298" text-anchor="middle" font-family="Arial" font-size="11" fill="black">Badminton</text>
  <!-- Legend -->
  <rect x="180" y="320" width="15" height="15" fill="#4488cc"/>
  <text x="200" y="333" font-family="Arial" font-size="12" fill="black">Adults</text>
  <rect x="270" y="320" width="15" height="15" fill="#cc4444"/>
  <text x="290" y="333" font-family="Arial" font-size="12" fill="black">Children</text>
  <!-- Y-axis label -->
  <text x="25" y="165" text-anchor="middle" font-family="Arial" font-size="12" fill="black" transform="rotate(-90 25 165)">Number of People</text>
</svg>
