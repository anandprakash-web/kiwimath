<svg viewBox="0 0 500 220" xmlns="http://www.w3.org/2000/svg">
  <!-- (a) Equilateral triangle -->
  <polygon points="65,40 30,100 100,100" fill="none" stroke="black" stroke-width="2"/>
  <!-- Equal marks on all sides -->
  <line x1="45" y1="68" x2="50" y2="72" stroke="black" stroke-width="1.5"/>
  <line x1="82" y1="68" x2="77" y2="72" stroke="black" stroke-width="1.5"/>
  <line x1="55" y1="100" x2="55" y2="95" stroke="black" stroke-width="1.5"/>
  <text x="65" y="125" text-anchor="middle" font-family="Arial" font-size="12" fill="black">(a) Equilateral</text>

  <!-- (b) Isosceles triangle -->
  <polygon points="190,40 155,100 225,100" fill="none" stroke="black" stroke-width="2"/>
  <!-- Two equal marks -->
  <line x1="170" y1="68" x2="175" y2="72" stroke="black" stroke-width="1.5"/>
  <line x1="210" y1="68" x2="205" y2="72" stroke="black" stroke-width="1.5"/>
  <text x="190" y="125" text-anchor="middle" font-family="Arial" font-size="12" fill="black">(b) Isosceles</text>

  <!-- (c) Scalene triangle -->
  <polygon points="300,50 280,100 360,100" fill="none" stroke="black" stroke-width="2"/>
  <text x="320" y="125" text-anchor="middle" font-family="Arial" font-size="12" fill="black">(c) Scalene</text>

  <!-- (d) Right isosceles -->
  <polygon points="420,40 420,100 480,100" fill="none" stroke="black" stroke-width="2"/>
  <rect x="420" y="86" width="14" height="14" fill="none" stroke="black" stroke-width="1"/>
  <!-- Equal marks -->
  <line x1="420" y1="68" x2="415" y2="68" stroke="black" stroke-width="1.5"/>
  <line x1="450" y1="100" x2="450" y2="105" stroke="black" stroke-width="1.5"/>
  <text x="450" y="125" text-anchor="middle" font-family="Arial" font-size="12" fill="black">(d) Right</text>
  <text x="450" y="140" text-anchor="middle" font-family="Arial" font-size="12" fill="black">Isosceles</text>

  <text x="250" y="180" text-anchor="middle" font-family="Arial" font-size="14" fill="black">Which triangle has zero lines of symmetry?</text>
</svg>
