<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 140" width="220" height="140">
  <!-- Trapezium ABCD with AB || DC -->
  <polygon points="60,20 180,20 200,120 20,120" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Parallel marks -->
  <line x1="110" y1="17" x2="115" y2="17" stroke="#333" stroke-width="1.5"/>
  <line x1="120" y1="17" x2="125" y2="17" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="123" x2="105" y2="123" stroke="#333" stroke-width="1.5"/>
  <line x1="110" y1="123" x2="115" y2="123" stroke="#333" stroke-width="1.5"/>
  <!-- Angle mark at A -->
  <path d="M 60,20 L 68,35 L 75,22" fill="none" stroke="#e63946" stroke-width="1.2"/>
  <text x="70" y="42" font-size="12" fill="#e63946" font-family="Arial">50°</text>
  <!-- Labels -->
  <text x="52" y="14" font-size="12" fill="#333" font-family="Arial">A</text>
  <text x="182" y="14" font-size="12" fill="#333" font-family="Arial">B</text>
  <text x="202" y="130" font-size="12" fill="#333" font-family="Arial">C</text>
  <text x="8" y="130" font-size="12" fill="#333" font-family="Arial">D</text>
</svg>
