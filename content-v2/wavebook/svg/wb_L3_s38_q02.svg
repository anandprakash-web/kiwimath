<svg viewBox="0 0 450 320" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="225" y="25" text-anchor="middle" font-family="Arial" font-size="14" fill="black" font-weight="bold">Weights of Children</text>
  <!-- Y-axis -->
  <line x1="80" y1="40" x2="80" y2="260" stroke="black" stroke-width="1.5"/>
  <!-- X-axis -->
  <line x1="80" y1="260" x2="420" y2="260" stroke="black" stroke-width="1.5"/>
  <!-- Y-axis labels (0 to 35, step 5) -->
  <text x="70" y="264" text-anchor="end" font-family="Arial" font-size="11" fill="black">0</text>
  <text x="70" y="232" text-anchor="end" font-family="Arial" font-size="11" fill="black">5</text>
  <text x="70" y="200" text-anchor="end" font-family="Arial" font-size="11" fill="black">10</text>
  <text x="70" y="168" text-anchor="end" font-family="Arial" font-size="11" fill="black">15</text>
  <text x="70" y="136" text-anchor="end" font-family="Arial" font-size="11" fill="black">20</text>
  <text x="70" y="104" text-anchor="end" font-family="Arial" font-size="11" fill="black">25</text>
  <text x="70" y="72" text-anchor="end" font-family="Arial" font-size="11" fill="black">30</text>
  <text x="70" y="40" text-anchor="end" font-family="Arial" font-size="11" fill="black">35</text>
  <!-- Grid -->
  <g stroke="#eee" stroke-width="0.5">
    <line x1="80" y1="228" x2="420" y2="228"/>
    <line x1="80" y1="196" x2="420" y2="196"/>
    <line x1="80" y1="164" x2="420" y2="164"/>
    <line x1="80" y1="132" x2="420" y2="132"/>
    <line x1="80" y1="100" x2="420" y2="100"/>
    <line x1="80" y1="68" x2="420" y2="68"/>
    <line x1="80" y1="36" x2="420" y2="36"/>
  </g>
  <!-- Bars: each unit = 6.4px height (220px / 35kg) -->
  <!-- Anya: 25kg = 160px -->
  <rect x="100" y="100" width="40" height="160" fill="#4488cc"/>
  <text x="120" y="278" text-anchor="middle" font-family="Arial" font-size="12" fill="black">Anya</text>
  <text x="120" y="93" text-anchor="middle" font-family="Arial" font-size="11" fill="blue">25</text>
  <!-- Bina: 30kg = 192px -->
  <rect x="165" y="68" width="40" height="192" fill="#4488cc"/>
  <text x="185" y="278" text-anchor="middle" font-family="Arial" font-size="12" fill="black">Bina</text>
  <text x="185" y="61" text-anchor="middle" font-family="Arial" font-size="11" fill="blue">30</text>
  <!-- Naina: 20kg = 128px -->
  <rect x="230" y="132" width="40" height="128" fill="#4488cc"/>
  <text x="250" y="278" text-anchor="middle" font-family="Arial" font-size="12" fill="black">Naina</text>
  <text x="250" y="125" text-anchor="middle" font-family="Arial" font-size="11" fill="blue">20</text>
  <!-- Dev: 30kg = 192px -->
  <rect x="295" y="68" width="40" height="192" fill="#4488cc"/>
  <text x="315" y="278" text-anchor="middle" font-family="Arial" font-size="12" fill="black">Dev</text>
  <text x="315" y="61" text-anchor="middle" font-family="Arial" font-size="11" fill="blue">30</text>
  <!-- Ria: 35kg = 224px -->
  <rect x="360" y="36" width="40" height="224" fill="#4488cc"/>
  <text x="380" y="278" text-anchor="middle" font-family="Arial" font-size="12" fill="black">Ria</text>
  <text x="380" y="29" text-anchor="middle" font-family="Arial" font-size="11" fill="blue">35</text>
  <!-- Axis label -->
  <text x="25" y="150" text-anchor="middle" font-family="Arial" font-size="12" fill="black" transform="rotate(-90 25 150)">Weight (kg)</text>
</svg>
