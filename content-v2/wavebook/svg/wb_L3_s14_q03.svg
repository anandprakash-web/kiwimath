<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial" font-size="14" fill="black" font-weight="bold">Find the Pattern</text>
  <!-- Row boxes -->
  <rect x="80" y="50" width="80" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="50" y="75" text-anchor="middle" font-family="Arial" font-size="13" fill="black">Row 1:</text>
  <text x="120" y="75" text-anchor="middle" font-family="Arial" font-size="16" fill="blue" font-weight="bold">8</text>

  <rect x="80" y="110" width="80" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="50" y="135" text-anchor="middle" font-family="Arial" font-size="13" fill="black">Row 2:</text>
  <text x="120" y="135" text-anchor="middle" font-family="Arial" font-size="16" fill="blue" font-weight="bold">17</text>

  <rect x="80" y="170" width="80" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="50" y="195" text-anchor="middle" font-family="Arial" font-size="13" fill="black">Row 3:</text>
  <text x="120" y="195" text-anchor="middle" font-family="Arial" font-size="16" fill="blue" font-weight="bold">26</text>

  <rect x="80" y="230" width="80" height="40" fill="#fff8dc" stroke="black" stroke-width="1.5"/>
  <text x="50" y="255" text-anchor="middle" font-family="Arial" font-size="13" fill="black">Row 4:</text>
  <text x="120" y="255" text-anchor="middle" font-family="Arial" font-size="18" fill="red" font-weight="bold">?</text>

  <!-- Arrows showing +9 -->
  <line x1="170" y1="70" x2="170" y2="110" stroke="green" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="195" y="95" font-family="Arial" font-size="13" fill="green" font-weight="bold">+9</text>

  <line x1="170" y1="130" x2="170" y2="170" stroke="green" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="195" y="155" font-family="Arial" font-size="13" fill="green" font-weight="bold">+9</text>

  <line x1="170" y1="190" x2="170" y2="230" stroke="green" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="195" y="215" font-family="Arial" font-size="13" fill="green" font-weight="bold">+9</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="green"/>
    </marker>
  </defs>
</svg>
