<svg viewBox="0 0 300 110" xmlns="http://www.w3.org/2000/svg" font-family="system-ui">
<rect x="10" y="20" width="60" height="60" fill="#FFF9C4" stroke="#2C3E50" stroke-width="1.5"/>
<text x="40" y="95" text-anchor="middle" font-size="9" fill="#333">1. Square</text>
<rect x="100" y="20" width="30" height="60" fill="#FFF9C4" stroke="#2C3E50" stroke-width="1.5"/>
<line x1="100" y1="20" x2="100" y2="80" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="3,2"/>
<text x="115" y="95" text-anchor="middle" font-size="9" fill="#333">2. Fold</text>
<rect x="170" y="50" width="30" height="30" fill="#FFF9C4" stroke="#2C3E50" stroke-width="1.5"/>
<text x="185" y="95" text-anchor="middle" font-size="9" fill="#333">3. Fold again</text>
<rect x="240" y="50" width="30" height="30" fill="#FFF9C4" stroke="#2C3E50" stroke-width="1.5"/>
<polygon points="255,50 270,50 270,65" fill="white" stroke="#FF6B6B" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="255" y="95" text-anchor="middle" font-size="9" fill="#333">4. Cut corner</text>
</svg>