<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Kiwi - neutral -->
  <defs>
    <radialGradient id="body-grad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>
  <!-- Body -->
  <path d="M50,25 Q55,20 60,25 L65,60 Q60,75 50,75 Q40,75 35,60 Z" fill="url(#body-grad)" filter="url(#shadow)"/>
  <!-- Belly -->
  <ellipse cx="50" cy="58" rx="12" ry="10" fill="#D1FAE5" opacity="0.7"/>
  <!-- Eyes -->
  <circle cx="42" cy="38" r="4" fill="white"/>
  <circle cx="58" cy="38" r="4" fill="white"/>
  <circle cx="43" cy="38" r="2.5" fill="#1a1a1a"/>
  <circle cx="59" cy="38" r="2.5" fill="#1a1a1a"/>
  <circle cx="43.5" cy="37" r="1" fill="white"/>
  <circle cx="59.5" cy="37" r="1" fill="white"/>
  <!-- Beak -->
  <path d="M47,44 L50,48 L53,44" fill="#D97706" stroke="#B45309" stroke-width="0.5"/>
  <!-- Feet -->
  <path d="M42,75 L38,82 L44,80 L42,75" fill="#D97706"/>
  <path d="M58,75 L54,80 L62,82 L58,75" fill="#D97706"/>
  <!-- Emotion indicator -->
  <text x="75" y="20" font-size="16" text-anchor="middle">😊</text>
  <title>Kiwi - Kiwi stands calmly, looking at the student</title>
</svg>