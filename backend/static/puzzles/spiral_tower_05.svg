<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1e"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="platform" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a6e"/>
      <stop offset="100%" stop-color="#2a2a4e"/>
    </linearGradient>
    <radialGradient id="mysteryGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6D00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF6D00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="30" cy="20" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="100" cy="50" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="200" cy="15" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="500" cy="30" r="0.7" fill="#fff" opacity="0.3"/>
  <circle cx="560" cy="60" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="450" cy="20" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="40" cy="380" r="0.6" fill="#fff" opacity="0.2"/>
  <circle cx="580" cy="350" r="1" fill="#fff" opacity="0.4"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" fill="#FFD700" font-family="Georgia, serif"
        font-size="20" font-weight="bold" filter="url(#glow)" opacity="0.9">
    THE SPIRAL TOWER
  </text>

  <!-- Central tower spine (vertical glow line) -->
  <line x1="300" y1="370" x2="300" y2="55" stroke="#4466AA" stroke-width="1" opacity="0.2"/>
  <line x1="300" y1="370" x2="300" y2="55" stroke="#4466AA" stroke-width="4" opacity="0.05"/>

  <!-- Spiral connecting line -->
  <path d="M300,362 Q360,348 340,335 Q280,322 260,308 Q320,295 350,282 Q280,268 250,255 Q330,242 360,228 Q270,215 240,202 Q340,188 370,175 Q260,162 230,148 Q350,135 380,122 Q250,108 220,95 Q355,82 385,68"
        fill="none" stroke="#FFD700" stroke-width="0.8" opacity="0.15" stroke-dasharray="3,3"/>

  <!-- Floor 1: value=1 -->
  <g transform="translate(300, 362)">
    <ellipse cx="0" cy="0" rx="45" ry="10" fill="url(#platform)" stroke="#5566AA" stroke-width="1" opacity="0.7"/>
    <text x="-30" y="-4" text-anchor="middle" fill="#8899CC" font-family="monospace" font-size="8">F1</text>
    <text x="8" y="5" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="16" font-weight="bold" filter="url(#glow)">1</text>
  </g>

  <!-- Floor 2: value=1 -->
  <g transform="translate(340, 335)">
    <ellipse cx="0" cy="0" rx="42" ry="9" fill="url(#platform)" stroke="#5566AA" stroke-width="1" opacity="0.7"/>
    <text x="-28" y="-3" text-anchor="middle" fill="#8899CC" font-family="monospace" font-size="8">F2</text>
    <text x="8" y="5" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="16" font-weight="bold" filter="url(#glow)">1</text>
  </g>

  <!-- Floor 3: value=2 -->
  <g transform="translate(260, 308)">
    <ellipse cx="0" cy="0" rx="42" ry="9" fill="url(#platform)" stroke="#5566AA" stroke-width="1" opacity="0.7"/>
    <text x="-28" y="-3" text-anchor="middle" fill="#8899CC" font-family="monospace" font-size="8">F3</text>
    <text x="8" y="5" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="16" font-weight="bold" filter="url(#glow)">2</text>
  </g>

  <!-- Floor 4: value=3 -->
  <g transform="translate(350, 282)">
    <ellipse cx="0" cy="0" rx="40" ry="9" fill="url(#platform)" stroke="#5566AA" stroke-width="1" opacity="0.7"/>
    <text x="-26" y="-3" text-anchor="middle" fill="#8899CC" font-family="monospace" font-size="8">F4</text>
    <text x="8" y="5" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="16" font-weight="bold" filter="url(#glow)">3</text>
  </g>

  <!-- Floor 5: value=5 -->
  <g transform="translate(250, 255)">
    <ellipse cx="0" cy="0" rx="40" ry="9" fill="url(#platform)" stroke="#5566AA" stroke-width="1" opacity="0.7"/>
    <text x="-26" y="-3" text-anchor="middle" fill="#8899CC" font-family="monospace" font-size="8">F5</text>
    <text x="8" y="5" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="16" font-weight="bold" filter="url(#glow)">5</text>
  </g>

  <!-- Floor 6: value=8 -->
  <g transform="translate(360, 228)">
    <ellipse cx="0" cy="0" rx="38" ry="8" fill="url(#platform)" stroke="#5566AA" stroke-width="1" opacity="0.7"/>
    <text x="-24" y="-2" text-anchor="middle" fill="#8899CC" font-family="monospace" font-size="8">F6</text>
    <text x="8" y="5" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="16" font-weight="bold" filter="url(#glow)">8</text>
  </g>

  <!-- Floor 7: value=13 -->
  <g transform="translate(240, 202)">
    <ellipse cx="0" cy="0" rx="38" ry="8" fill="url(#platform)" stroke="#5566AA" stroke-width="1" opacity="0.7"/>
    <text x="-26" y="-2" text-anchor="middle" fill="#8899CC" font-family="monospace" font-size="8">F7</text>
    <text x="8" y="5" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="15" font-weight="bold" filter="url(#glow)">13</text>
  </g>

  <!-- Floor 8: value=21 -->
  <g transform="translate(370, 175)">
    <ellipse cx="0" cy="0" rx="36" ry="8" fill="url(#platform)" stroke="#5566AA" stroke-width="1" opacity="0.7"/>
    <text x="-24" y="-2" text-anchor="middle" fill="#8899CC" font-family="monospace" font-size="8">F8</text>
    <text x="8" y="5" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="15" font-weight="bold" filter="url(#glow)">21</text>
  </g>

  <!-- Floor 9: value=34 -->
  <g transform="translate(230, 148)">
    <ellipse cx="0" cy="0" rx="36" ry="8" fill="url(#platform)" stroke="#5566AA" stroke-width="1" opacity="0.7"/>
    <text x="-24" y="-2" text-anchor="middle" fill="#8899CC" font-family="monospace" font-size="8">F9</text>
    <text x="8" y="5" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="14" font-weight="bold" filter="url(#glow)">34</text>
  </g>

  <!-- Floor 10: value=55 -->
  <g transform="translate(380, 122)">
    <ellipse cx="0" cy="0" rx="34" ry="7" fill="url(#platform)" stroke="#5566AA" stroke-width="1" opacity="0.7"/>
    <text x="-22" y="-1" text-anchor="middle" fill="#8899CC" font-family="monospace" font-size="8">F10</text>
    <text x="8" y="5" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="14" font-weight="bold" filter="url(#glow)">55</text>
  </g>

  <!-- Floor 11: value=89 -->
  <g transform="translate(220, 95)">
    <ellipse cx="0" cy="0" rx="34" ry="7" fill="url(#platform)" stroke="#5566AA" stroke-width="1" opacity="0.7"/>
    <text x="-22" y="-1" text-anchor="middle" fill="#8899CC" font-family="monospace" font-size="8">F11</text>
    <text x="8" y="5" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="14" font-weight="bold" filter="url(#glow)">89</text>
  </g>

  <!-- Floor 12: MYSTERY = 144 -->
  <g transform="translate(385, 65)">
    <circle cx="0" cy="0" r="22" fill="url(#mysteryGlow)"/>
    <ellipse cx="0" cy="0" rx="34" ry="7" fill="none" stroke="#FF6D00" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="34" ry="7" fill="#FF6D00" opacity="0.15">
      <animate attributeName="opacity" values="0.08;0.2;0.08" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <text x="-22" y="-1" text-anchor="middle" fill="#FF6D00" font-family="monospace" font-size="8" opacity="0.8">F12</text>
    <text x="8" y="6" text-anchor="middle" fill="#FF6D00" font-family="monospace" font-size="18" font-weight="bold" filter="url(#glow)">
      ?
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </text>
    <!-- Crown/flag at top -->
    <polygon points="-6,-12 0,-20 6,-12" fill="#FF6D00" opacity="0.4">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Side panel: pattern hint -->
  <g transform="translate(520, 140)">
    <rect x="-50" y="-40" width="100" height="220" rx="6" fill="#0a0a1e" stroke="#4466AA" stroke-width="0.8" opacity="0.5"/>
    <text x="0" y="-25" text-anchor="middle" fill="#FFD700" font-family="Georgia, serif" font-size="10" opacity="0.6">PATTERN</text>
    <line x1="-40" y1="-20" x2="40" y2="-20" stroke="#4466AA" stroke-width="0.5" opacity="0.3"/>
    <g fill="#8899CC" font-family="monospace" font-size="9" opacity="0.5">
      <text x="0" y="-5" text-anchor="middle">1</text>
      <text x="0" y="10" text-anchor="middle">1</text>
      <text x="0" y="25" text-anchor="middle">1+1=2</text>
      <text x="0" y="40" text-anchor="middle">1+2=3</text>
      <text x="0" y="55" text-anchor="middle">2+3=5</text>
      <text x="0" y="70" text-anchor="middle">3+5=8</text>
      <text x="0" y="85" text-anchor="middle">5+8=13</text>
      <text x="0" y="100" text-anchor="middle">8+13=21</text>
      <text x="0" y="115" text-anchor="middle">13+21=34</text>
      <text x="0" y="130" text-anchor="middle">21+34=55</text>
      <text x="0" y="145" text-anchor="middle">34+55=89</text>
      <text x="0" y="163" text-anchor="middle" fill="#FF6D00" opacity="1" font-size="10">55+89= ?</text>
    </g>
  </g>

  <!-- Bottom hint text -->
  <text x="260" y="388" text-anchor="middle" fill="#6677AA" font-family="Georgia, serif"
        font-size="11" font-style="italic" opacity="0.7">
    Each floor's number is built from the two floors below it. What crowns the tower?
  </text>
</svg>