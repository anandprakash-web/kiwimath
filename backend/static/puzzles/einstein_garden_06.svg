<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1e"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="30" cy="15" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="150" cy="25" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="350" cy="12" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="500" cy="20" r="0.7" fill="#fff" opacity="0.3"/>
  <circle cx="570" cy="35" r="1" fill="#fff" opacity="0.4"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" fill="#FFD700" font-family="Georgia, serif"
        font-size="18" font-weight="bold" filter="url(#glow)" opacity="0.9">
    EINSTEIN'S GARDEN
  </text>

  <!-- Ground line -->
  <line x1="20" y1="210" x2="580" y2="210" stroke="#3a5a2e" stroke-width="1" opacity="0.3"/>

  <!-- === 5 HOUSES === -->

  <!-- House 1: Red -->
  <g transform="translate(65, 105)">
    <!-- Roof -->
    <polygon points="0,0 45,-35 90,0" fill="#CC3333" stroke="#992222" stroke-width="1" opacity="0.8"/>
    <!-- Chimney -->
    <rect x="60" y="-30" width="10" height="20" fill="#884444" opacity="0.6"/>
    <!-- Wall -->
    <rect x="5" y="0" width="80" height="60" fill="#CC3333" stroke="#992222" stroke-width="1" opacity="0.6"/>
    <!-- Door -->
    <rect x="35" y="25" width="20" height="35" rx="2" fill="#661111" opacity="0.7"/>
    <circle cx="50" cy="44" r="2" fill="#FFD700" opacity="0.5"/>
    <!-- Windows -->
    <rect x="12" y="10" width="16" height="16" fill="#FFEE88" opacity="0.3" stroke="#992222" stroke-width="0.5"/>
    <rect x="62" y="10" width="16" height="16" fill="#FFEE88" opacity="0.3" stroke="#992222" stroke-width="0.5"/>
    <!-- Label -->
    <text x="45" y="75" text-anchor="middle" fill="#FF6666" font-family="Georgia, serif" font-size="8" opacity="0.7">RED</text>
    <!-- Number -->
    <text x="45" y="-8" text-anchor="middle" fill="#FFD700" font-family="Georgia, serif" font-size="9" opacity="0.6">#1</text>
  </g>

  <!-- House 2: Green -->
  <g transform="translate(170, 105)">
    <polygon points="0,0 45,-35 90,0" fill="#33AA44" stroke="#228833" stroke-width="1" opacity="0.8"/>
    <rect x="5" y="0" width="80" height="60" fill="#33AA44" stroke="#228833" stroke-width="1" opacity="0.6"/>
    <rect x="35" y="25" width="20" height="35" rx="2" fill="#116622" opacity="0.7"/>
    <circle cx="50" cy="44" r="2" fill="#FFD700" opacity="0.5"/>
    <rect x="12" y="10" width="16" height="16" fill="#FFEE88" opacity="0.3" stroke="#228833" stroke-width="0.5"/>
    <rect x="62" y="10" width="16" height="16" fill="#FFEE88" opacity="0.3" stroke="#228833" stroke-width="0.5"/>
    <text x="45" y="75" text-anchor="middle" fill="#66CC77" font-family="Georgia, serif" font-size="8" opacity="0.7">GREEN</text>
    <text x="45" y="-8" text-anchor="middle" fill="#FFD700" font-family="Georgia, serif" font-size="9" opacity="0.6">#2</text>
    <!-- Mystery flower indicator -->
    <circle cx="45" cy="95" r="10" fill="#FF6D00" opacity="0.12">
      <animate attributeName="opacity" values="0.08;0.18;0.08" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="45" cy="95" r="10" fill="none" stroke="#FF6D00" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- House 3: White -->
  <g transform="translate(275, 105)">
    <polygon points="0,0 45,-35 90,0" fill="#CCCCCC" stroke="#999999" stroke-width="1" opacity="0.8"/>
    <rect x="5" y="0" width="80" height="60" fill="#CCCCCC" stroke="#999999" stroke-width="1" opacity="0.5"/>
    <rect x="35" y="25" width="20" height="35" rx="2" fill="#888888" opacity="0.7"/>
    <circle cx="50" cy="44" r="2" fill="#FFD700" opacity="0.5"/>
    <rect x="12" y="10" width="16" height="16" fill="#FFEE88" opacity="0.3" stroke="#999999" stroke-width="0.5"/>
    <rect x="62" y="10" width="16" height="16" fill="#FFEE88" opacity="0.3" stroke="#999999" stroke-width="0.5"/>
    <text x="45" y="75" text-anchor="middle" fill="#AAAAAA" font-family="Georgia, serif" font-size="8" opacity="0.7">WHITE</text>
    <text x="45" y="-8" text-anchor="middle" fill="#FFD700" font-family="Georgia, serif" font-size="9" opacity="0.6">#3</text>
  </g>

  <!-- House 4: Yellow -->
  <g transform="translate(380, 105)">
    <polygon points="0,0 45,-35 90,0" fill="#DDBB33" stroke="#AA8822" stroke-width="1" opacity="0.8"/>
    <rect x="5" y="0" width="80" height="60" fill="#DDBB33" stroke="#AA8822" stroke-width="1" opacity="0.6"/>
    <rect x="35" y="25" width="20" height="35" rx="2" fill="#887711" opacity="0.7"/>
    <circle cx="50" cy="44" r="2" fill="#FFD700" opacity="0.5"/>
    <rect x="12" y="10" width="16" height="16" fill="#FFEE88" opacity="0.3" stroke="#AA8822" stroke-width="0.5"/>
    <rect x="62" y="10" width="16" height="16" fill="#FFEE88" opacity="0.3" stroke="#AA8822" stroke-width="0.5"/>
    <text x="45" y="75" text-anchor="middle" fill="#DDCC55" font-family="Georgia, serif" font-size="8" opacity="0.7">YELLOW</text>
    <text x="45" y="-8" text-anchor="middle" fill="#FFD700" font-family="Georgia, serif" font-size="9" opacity="0.6">#4</text>
  </g>

  <!-- House 5: Blue -->
  <g transform="translate(485, 105)">
    <polygon points="0,0 45,-35 90,0" fill="#3366CC" stroke="#2244AA" stroke-width="1" opacity="0.8"/>
    <rect x="5" y="0" width="80" height="60" fill="#3366CC" stroke="#2244AA" stroke-width="1" opacity="0.6"/>
    <rect x="35" y="25" width="20" height="35" rx="2" fill="#112266" opacity="0.7"/>
    <circle cx="50" cy="44" r="2" fill="#FFD700" opacity="0.5"/>
    <rect x="12" y="10" width="16" height="16" fill="#FFEE88" opacity="0.3" stroke="#2244AA" stroke-width="0.5"/>
    <rect x="62" y="10" width="16" height="16" fill="#FFEE88" opacity="0.3" stroke="#2244AA" stroke-width="0.5"/>
    <text x="45" y="75" text-anchor="middle" fill="#6699DD" font-family="Georgia, serif" font-size="8" opacity="0.7">BLUE</text>
    <text x="45" y="-8" text-anchor="middle" fill="#FFD700" font-family="Georgia, serif" font-size="9" opacity="0.6">#5</text>
  </g>

  <!-- Attribute slots below houses -->
  <!-- Row labels -->
  <g fill="#8899CC" font-family="Georgia, serif" font-size="8" opacity="0.5">
    <text x="38" y="226" text-anchor="end">Pet:</text>
    <text x="38" y="242" text-anchor="end">Drink:</text>
    <text x="38" y="258" text-anchor="end">Flower:</text>
    <text x="38" y="274" text-anchor="end">Num:</text>
  </g>

  <!-- House 1 slots -->
  <g transform="translate(65, 0)" font-family="monospace" font-size="9" text-anchor="middle">
    <text x="45" y="226" fill="#FFD700" opacity="0.7">dog</text>
    <text x="45" y="242" fill="#8899CC" opacity="0.4">?</text>
    <text x="45" y="258" fill="#8899CC" opacity="0.4">?</text>
    <text x="45" y="274" fill="#FFD700" opacity="0.7">3</text>
  </g>

  <!-- House 2 slots (GREEN - mystery flower) -->
  <g transform="translate(170, 0)" font-family="monospace" font-size="9" text-anchor="middle">
    <text x="45" y="226" fill="#8899CC" opacity="0.4">?</text>
    <text x="45" y="242" fill="#FFD700" opacity="0.7">coffee</text>
    <text x="45" y="258" fill="#FF6D00" font-size="11" font-weight="bold">
      ?
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </text>
    <text x="45" y="274" fill="#8899CC" opacity="0.4">?</text>
  </g>

  <!-- House 3 slots -->
  <g transform="translate(275, 0)" font-family="monospace" font-size="9" text-anchor="middle">
    <text x="45" y="226" fill="#8899CC" opacity="0.4">?</text>
    <text x="45" y="242" fill="#FFD700" opacity="0.7">milk</text>
    <text x="45" y="258" fill="#8899CC" opacity="0.4">?</text>
    <text x="45" y="274" fill="#FFD700" opacity="0.7">5</text>
  </g>

  <!-- House 4 slots -->
  <g transform="translate(380, 0)" font-family="monospace" font-size="9" text-anchor="middle">
    <text x="45" y="226" fill="#FFD700" opacity="0.7">cat</text>
    <text x="45" y="242" fill="#8899CC" opacity="0.4">?</text>
    <text x="45" y="258" fill="#FFD700" opacity="0.7">rose</text>
    <text x="45" y="274" fill="#8899CC" opacity="0.4">?</text>
  </g>

  <!-- House 5 slots -->
  <g transform="translate(485, 0)" font-family="monospace" font-size="9" text-anchor="middle">
    <text x="45" y="226" fill="#8899CC" opacity="0.4">?</text>
    <text x="45" y="242" fill="#8899CC" opacity="0.4">?</text>
    <text x="45" y="258" fill="#8899CC" opacity="0.4">?</text>
    <text x="45" y="274" fill="#FFD700" opacity="0.7">7</text>
  </g>

  <!-- Separator line -->
  <line x1="40" y1="283" x2="580" y2="283" stroke="#4466AA" stroke-width="0.5" opacity="0.2"/>

  <!-- Floating clue cards -->
  <!-- Clue 1 -->
  <g transform="translate(75, 305)" filter="url(#cardShadow)">
    <rect x="-55" y="-12" width="110" height="28" rx="4" fill="#1a2a3e" stroke="#4466AA" stroke-width="0.8" opacity="0.7"/>
    <text x="0" y="-1" text-anchor="middle" fill="#AABBDD" font-family="monospace" font-size="7" opacity="0.9">CLUE 1: The dog owner</text>
    <text x="0" y="10" text-anchor="middle" fill="#AABBDD" font-family="monospace" font-size="7" opacity="0.9">drinks tea.</text>
  </g>

  <!-- Clue 2 -->
  <g transform="translate(225, 305)" filter="url(#cardShadow)">
    <rect x="-65" y="-12" width="130" height="28" rx="4" fill="#1a2a3e" stroke="#4466AA" stroke-width="0.8" opacity="0.7"/>
    <text x="0" y="-1" text-anchor="middle" fill="#AABBDD" font-family="monospace" font-size="7" opacity="0.9">CLUE 2: Tulips grow next</text>
    <text x="0" y="10" text-anchor="middle" fill="#AABBDD" font-family="monospace" font-size="7" opacity="0.9">to the coffee drinker.</text>
  </g>

  <!-- Clue 3 -->
  <g transform="translate(390, 305)" filter="url(#cardShadow)">
    <rect x="-65" y="-12" width="130" height="28" rx="4" fill="#1a2a3e" stroke="#4466AA" stroke-width="0.8" opacity="0.7"/>
    <text x="0" y="-1" text-anchor="middle" fill="#AABBDD" font-family="monospace" font-size="7" opacity="0.9">CLUE 3: The green house is</text>
    <text x="0" y="10" text-anchor="middle" fill="#AABBDD" font-family="monospace" font-size="7" opacity="0.9">left of the white house.</text>
  </g>

  <!-- Clue 4 -->
  <g transform="translate(535, 305)" filter="url(#cardShadow)">
    <rect x="-50" y="-12" width="100" height="28" rx="4" fill="#1a2a3e" stroke="#4466AA" stroke-width="0.8" opacity="0.7"/>
    <text x="0" y="-1" text-anchor="middle" fill="#AABBDD" font-family="monospace" font-size="7" opacity="0.9">CLUE 4: The bird owner</text>
    <text x="0" y="10" text-anchor="middle" fill="#AABBDD" font-family="monospace" font-size="7" opacity="0.9">lives in the blue house.</text>
  </g>

  <!-- Question callout -->
  <g transform="translate(300, 350)">
    <rect x="-145" y="-13" width="290" height="26" rx="4" fill="none" stroke="#FF6D00" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="-145" y="-13" width="290" height="26" rx="4" fill="#FF6D00" opacity="0.06">
      <animate attributeName="opacity" values="0.03;0.1;0.03" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="3" text-anchor="middle" fill="#FF6D00" font-family="Georgia, serif" font-size="12" font-weight="bold">
      What flower grows in the green house?
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Bottom hint -->
  <text x="300" y="388" text-anchor="middle" fill="#6677AA" font-family="Georgia, serif"
        font-size="10" font-style="italic" opacity="0.7">
    Use the clues to fill every slot. Only one arrangement works.
  </text>
</svg>