<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1e"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cellBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a5e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1a1a3e" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lockBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a1e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2a1a0e" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Background stars -->
  <circle cx="45" cy="30" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="120" cy="55" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="520" cy="40" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="550" cy="90" r="0.7" fill="#fff" opacity="0.3"/>
  <circle cx="30" cy="350" r="0.6" fill="#fff" opacity="0.2"/>
  <circle cx="570" cy="360" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="90" cy="200" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="510" cy="300" r="1.2" fill="#fff" opacity="0.5"/>

  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" fill="#FFD700" font-family="Georgia, serif"
        font-size="20" font-weight="bold" filter="url(#glow)" opacity="0.9">
    THE LOCKED GRID
  </text>

  <!-- Magic constant indicator -->
  <g transform="translate(490, 60)">
    <rect x="-45" y="-14" width="90" height="28" rx="14" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="11" opacity="0.7">SUM = ???</text>
  </g>

  <!-- 4x4 Grid -->
  <!-- Grid starts at x=165, y=55, each cell is 68x68 -->

  <!-- Row 1 -->
  <!-- Cell (0,0): 16 - revealed -->
  <rect x="165" y="55" width="68" height="68" rx="6" fill="url(#cellBg)" stroke="#4466AA" stroke-width="1.5"/>
  <text x="199" y="98" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="24" font-weight="bold" filter="url(#glow)">16</text>

  <!-- Cell (1,0): 3 - locked -->
  <rect x="233" y="55" width="68" height="68" rx="6" fill="url(#lockBg)" stroke="#665533" stroke-width="1.5"/>
  <g transform="translate(267, 82)">
    <rect x="-8" y="-4" width="16" height="14" rx="2" fill="none" stroke="#AA8844" stroke-width="1.5"/>
    <path d="M-5,-4 L-5,-9 Q-5,-14 0,-14 Q5,-14 5,-9 L5,-4" fill="none" stroke="#AA8844" stroke-width="1.5"/>
    <circle cx="0" cy="4" r="1.5" fill="#AA8844"/>
  </g>

  <!-- Cell (2,0): 2 - revealed -->
  <rect x="301" y="55" width="68" height="68" rx="6" fill="url(#cellBg)" stroke="#4466AA" stroke-width="1.5"/>
  <text x="335" y="98" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="24" font-weight="bold" filter="url(#glow)">2</text>

  <!-- Cell (3,0): 13 - revealed -->
  <rect x="369" y="55" width="68" height="68" rx="6" fill="url(#cellBg)" stroke="#4466AA" stroke-width="1.5"/>
  <text x="403" y="98" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="24" font-weight="bold" filter="url(#glow)">13</text>

  <!-- Row 2 -->
  <!-- Cell (0,1): 5 - revealed -->
  <rect x="165" y="123" width="68" height="68" rx="6" fill="url(#cellBg)" stroke="#4466AA" stroke-width="1.5"/>
  <text x="199" y="166" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="24" font-weight="bold" filter="url(#glow)">5</text>

  <!-- Cell (1,1): 10 - locked -->
  <rect x="233" y="123" width="68" height="68" rx="6" fill="url(#lockBg)" stroke="#665533" stroke-width="1.5"/>
  <g transform="translate(267, 150)">
    <rect x="-8" y="-4" width="16" height="14" rx="2" fill="none" stroke="#AA8844" stroke-width="1.5"/>
    <path d="M-5,-4 L-5,-9 Q-5,-14 0,-14 Q5,-14 5,-9 L5,-4" fill="none" stroke="#AA8844" stroke-width="1.5"/>
    <circle cx="0" cy="4" r="1.5" fill="#AA8844"/>
  </g>

  <!-- Cell (2,1): 11 - revealed -->
  <rect x="301" y="123" width="68" height="68" rx="6" fill="url(#cellBg)" stroke="#4466AA" stroke-width="1.5"/>
  <text x="335" y="166" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="24" font-weight="bold" filter="url(#glow)">11</text>

  <!-- Cell (3,1): ? - MYSTERY CELL -->
  <rect x="369" y="123" width="68" height="68" rx="6" fill="none" stroke="#FF6D00" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="369" y="123" width="68" height="68" rx="6" fill="#FF6D00" opacity="0.12">
    <animate attributeName="opacity" values="0.08;0.18;0.08" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="403" y="168" text-anchor="middle" fill="#FF6D00" font-family="monospace" font-size="28" font-weight="bold" filter="url(#glow)">
    ?
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- Row 3 -->
  <!-- Cell (0,2): 9 - locked -->
  <rect x="165" y="191" width="68" height="68" rx="6" fill="url(#lockBg)" stroke="#665533" stroke-width="1.5"/>
  <g transform="translate(199, 218)">
    <rect x="-8" y="-4" width="16" height="14" rx="2" fill="none" stroke="#AA8844" stroke-width="1.5"/>
    <path d="M-5,-4 L-5,-9 Q-5,-14 0,-14 Q5,-14 5,-9 L5,-4" fill="none" stroke="#AA8844" stroke-width="1.5"/>
    <circle cx="0" cy="4" r="1.5" fill="#AA8844"/>
  </g>

  <!-- Cell (1,2): 6 - revealed -->
  <rect x="233" y="191" width="68" height="68" rx="6" fill="url(#cellBg)" stroke="#4466AA" stroke-width="1.5"/>
  <text x="267" y="234" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="24" font-weight="bold" filter="url(#glow)">6</text>

  <!-- Cell (2,2): 7 - revealed -->
  <rect x="301" y="191" width="68" height="68" rx="6" fill="url(#cellBg)" stroke="#4466AA" stroke-width="1.5"/>
  <text x="335" y="234" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="24" font-weight="bold" filter="url(#glow)">7</text>

  <!-- Cell (3,2): 12 - locked -->
  <rect x="369" y="191" width="68" height="68" rx="6" fill="url(#lockBg)" stroke="#665533" stroke-width="1.5"/>
  <g transform="translate(403, 218)">
    <rect x="-8" y="-4" width="16" height="14" rx="2" fill="none" stroke="#AA8844" stroke-width="1.5"/>
    <path d="M-5,-4 L-5,-9 Q-5,-14 0,-14 Q5,-14 5,-9 L5,-4" fill="none" stroke="#AA8844" stroke-width="1.5"/>
    <circle cx="0" cy="4" r="1.5" fill="#AA8844"/>
  </g>

  <!-- Row 4 -->
  <!-- Cell (0,3): 4 - revealed -->
  <rect x="165" y="259" width="68" height="68" rx="6" fill="url(#cellBg)" stroke="#4466AA" stroke-width="1.5"/>
  <text x="199" y="302" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="24" font-weight="bold" filter="url(#glow)">4</text>

  <!-- Cell (1,3): 15 - revealed -->
  <rect x="233" y="259" width="68" height="68" rx="6" fill="url(#cellBg)" stroke="#4466AA" stroke-width="1.5"/>
  <text x="267" y="302" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="24" font-weight="bold" filter="url(#glow)">15</text>

  <!-- Cell (2,3): 14 - locked -->
  <rect x="301" y="259" width="68" height="68" rx="6" fill="url(#lockBg)" stroke="#665533" stroke-width="1.5"/>
  <g transform="translate(335, 286)">
    <rect x="-8" y="-4" width="16" height="14" rx="2" fill="none" stroke="#AA8844" stroke-width="1.5"/>
    <path d="M-5,-4 L-5,-9 Q-5,-14 0,-14 Q5,-14 5,-9 L5,-4" fill="none" stroke="#AA8844" stroke-width="1.5"/>
    <circle cx="0" cy="4" r="1.5" fill="#AA8844"/>
  </g>

  <!-- Cell (3,3): 1 - revealed -->
  <rect x="369" y="259" width="68" height="68" rx="6" fill="url(#cellBg)" stroke="#4466AA" stroke-width="1.5"/>
  <text x="403" y="302" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="24" font-weight="bold" filter="url(#glow)">1</text>

  <!-- Row/Column sum arrows -->
  <g fill="#6677AA" font-family="monospace" font-size="11" opacity="0.5">
    <!-- Row arrows on left -->
    <text x="148" y="98" text-anchor="end">R1</text>
    <text x="148" y="166" text-anchor="end">R2</text>
    <text x="148" y="234" text-anchor="end">R3</text>
    <text x="148" y="302" text-anchor="end">R4</text>
    <!-- Column labels on top -->
    <text x="199" y="50" text-anchor="middle">C1</text>
    <text x="267" y="50" text-anchor="middle">C2</text>
    <text x="335" y="50" text-anchor="middle">C3</text>
    <text x="403" y="50" text-anchor="middle">C4</text>
  </g>

  <!-- Diagonal hint lines -->
  <line x1="165" y1="55" x2="437" y2="327" stroke="#FFD700" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,4"/>
  <line x1="437" y1="55" x2="165" y2="327" stroke="#FFD700" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,4"/>

  <!-- Legend -->
  <g transform="translate(500, 130)">
    <rect x="-30" y="-10" width="16" height="16" rx="3" fill="url(#cellBg)" stroke="#4466AA" stroke-width="1"/>
    <text x="-2" y="3" fill="#8899CC" font-family="Georgia, serif" font-size="10">= Known</text>
  </g>
  <g transform="translate(500, 155)">
    <rect x="-30" y="-10" width="16" height="16" rx="3" fill="url(#lockBg)" stroke="#665533" stroke-width="1"/>
    <text x="-2" y="3" fill="#8899CC" font-family="Georgia, serif" font-size="10">= Locked</text>
  </g>
  <g transform="translate(500, 180)">
    <rect x="-30" y="-10" width="16" height="16" rx="3" fill="#FF6D00" fill-opacity="0.15" stroke="#FF6D00" stroke-width="1"/>
    <text x="-2" y="3" fill="#8899CC" font-family="Georgia, serif" font-size="10">= Solve!</text>
  </g>

  <!-- Bottom hint text -->
  <text x="300" y="355" text-anchor="middle" fill="#6677AA" font-family="Georgia, serif"
        font-size="11" font-style="italic" opacity="0.7">
    Every row, column, and diagonal sums to the same number.
  </text>
  <text x="300" y="372" text-anchor="middle" fill="#6677AA" font-family="Georgia, serif"
        font-size="11" font-style="italic" opacity="0.7">
    What belongs in the locked cell?
  </text>
</svg>