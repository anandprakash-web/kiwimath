<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1a0e"/>
      <stop offset="100%" stop-color="#050e08"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="letterBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a1e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a1a0e" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Scanline effect -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="600" y2="0" stroke="#00FF00" stroke-width="1"/>
    <line x1="0" y1="4" x2="600" y2="4" stroke="#00FF00" stroke-width="1"/>
    <line x1="0" y1="8" x2="600" y2="8" stroke="#00FF00" stroke-width="1"/>
    <line x1="0" y1="12" x2="600" y2="12" stroke="#00FF00" stroke-width="1"/>
    <line x1="0" y1="16" x2="600" y2="16" stroke="#00FF00" stroke-width="1"/>
    <line x1="0" y1="20" x2="600" y2="20" stroke="#00FF00" stroke-width="1"/>
  </g>

  <!-- Matrix-style falling characters (decorative) -->
  <g fill="#00AA00" font-family="monospace" font-size="10" opacity="0.12">
    <text x="20" y="50">1</text><text x="20" y="80">0</text><text x="20" y="110">7</text>
    <text x="40" y="70">3</text><text x="40" y="100">9</text><text x="40" y="130">2</text>
    <text x="560" y="60">4</text><text x="560" y="90">8</text><text x="560" y="120">5</text>
    <text x="580" y="40">6</text><text x="580" y="70">1</text><text x="580" y="100">0</text>
    <text x="20" y="280">5</text><text x="40" y="310">3</text><text x="560" y="290">7</text><text x="580" y="320">2</text>
  </g>

  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" fill="#00FF66" font-family="'Courier New', monospace"
        font-size="20" font-weight="bold" filter="url(#greenGlow)" letter-spacing="4">
    THE CODE BREAKER
  </text>

  <!-- Decorative cipher wheel -->
  <circle cx="530" cy="50" r="25" fill="none" stroke="#00AA00" stroke-width="0.5" opacity="0.3"/>
  <circle cx="530" cy="50" r="20" fill="none" stroke="#00AA00" stroke-width="0.5" opacity="0.2"/>
  <g fill="#00AA00" font-family="monospace" font-size="7" opacity="0.3">
    <text x="530" y="30" text-anchor="middle">0</text>
    <text x="548" y="38" text-anchor="middle">1</text>
    <text x="553" y="53" text-anchor="middle">2</text>
    <text x="548" y="68" text-anchor="middle">3</text>
    <text x="530" y="73" text-anchor="middle">4</text>
    <text x="512" y="68" text-anchor="middle">5</text>
    <text x="507" y="53" text-anchor="middle">6</text>
    <text x="512" y="38" text-anchor="middle">7</text>
  </g>

  <!-- SEND row (centered) -->
  <g transform="translate(160, 85)">
    <!-- S -->
    <rect x="0" y="0" width="50" height="55" rx="4" fill="url(#letterBox)" stroke="#00CC44" stroke-width="1.5"/>
    <text x="25" y="38" text-anchor="middle" fill="#00FF66" font-family="'Courier New', monospace" font-size="30" font-weight="bold" filter="url(#greenGlow)">S</text>
    <!-- E -->
    <rect x="60" y="0" width="50" height="55" rx="4" fill="url(#letterBox)" stroke="#00CC44" stroke-width="1.5"/>
    <text x="85" y="38" text-anchor="middle" fill="#00FF66" font-family="'Courier New', monospace" font-size="30" font-weight="bold" filter="url(#greenGlow)">E</text>
    <!-- N -->
    <rect x="120" y="0" width="50" height="55" rx="4" fill="url(#letterBox)" stroke="#00CC44" stroke-width="1.5"/>
    <text x="145" y="38" text-anchor="middle" fill="#00FF66" font-family="'Courier New', monospace" font-size="30" font-weight="bold" filter="url(#greenGlow)">N</text>
    <!-- D -->
    <rect x="180" y="0" width="50" height="55" rx="4" fill="url(#letterBox)" stroke="#00CC44" stroke-width="1.5"/>
    <text x="205" y="38" text-anchor="middle" fill="#00FF66" font-family="'Courier New', monospace" font-size="30" font-weight="bold" filter="url(#greenGlow)">D</text>
  </g>

  <!-- Plus sign -->
  <text x="130" y="190" text-anchor="middle" fill="#00FF66" font-family="'Courier New', monospace" font-size="36" font-weight="bold" filter="url(#greenGlow)" opacity="0.8">+</text>

  <!-- MORE row -->
  <g transform="translate(100, 155)">
    <!-- M - mystery letter! -->
    <rect x="0" y="0" width="50" height="55" rx="4" fill="none" stroke="#FF6D00" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="0" width="50" height="55" rx="4" fill="#FF6D00" opacity="0.1">
      <animate attributeName="opacity" values="0.05;0.15;0.05" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="25" y="38" text-anchor="middle" fill="#FF6D00" font-family="'Courier New', monospace" font-size="30" font-weight="bold" filter="url(#glow)">M</text>
    <!-- O -->
    <rect x="60" y="0" width="50" height="55" rx="4" fill="url(#letterBox)" stroke="#00CC44" stroke-width="1.5"/>
    <text x="85" y="38" text-anchor="middle" fill="#00FF66" font-family="'Courier New', monospace" font-size="30" font-weight="bold" filter="url(#greenGlow)">O</text>
    <!-- R -->
    <rect x="120" y="0" width="50" height="55" rx="4" fill="url(#letterBox)" stroke="#00CC44" stroke-width="1.5"/>
    <text x="145" y="38" text-anchor="middle" fill="#00FF66" font-family="'Courier New', monospace" font-size="30" font-weight="bold" filter="url(#greenGlow)">R</text>
    <!-- E -->
    <rect x="180" y="0" width="50" height="55" rx="4" fill="url(#letterBox)" stroke="#00CC44" stroke-width="1.5"/>
    <text x="205" y="38" text-anchor="middle" fill="#00FF66" font-family="'Courier New', monospace" font-size="30" font-weight="bold" filter="url(#greenGlow)">E</text>
  </g>

  <!-- Divider line -->
  <line x1="90" y1="225" x2="410" y2="225" stroke="#00FF66" stroke-width="2" filter="url(#greenGlow)" opacity="0.7"/>

  <!-- MONEY row -->
  <g transform="translate(100, 240)">
    <!-- M -->
    <rect x="0" y="0" width="50" height="55" rx="4" fill="none" stroke="#FF6D00" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="0" width="50" height="55" rx="4" fill="#FF6D00" opacity="0.1">
      <animate attributeName="opacity" values="0.05;0.15;0.05" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="25" y="38" text-anchor="middle" fill="#FF6D00" font-family="'Courier New', monospace" font-size="30" font-weight="bold" filter="url(#glow)">M</text>
    <!-- O -->
    <rect x="60" y="0" width="50" height="55" rx="4" fill="url(#letterBox)" stroke="#00CC44" stroke-width="1.5"/>
    <text x="85" y="38" text-anchor="middle" fill="#00FF66" font-family="'Courier New', monospace" font-size="30" font-weight="bold" filter="url(#greenGlow)">O</text>
    <!-- N -->
    <rect x="120" y="0" width="50" height="55" rx="4" fill="url(#letterBox)" stroke="#00CC44" stroke-width="1.5"/>
    <text x="145" y="38" text-anchor="middle" fill="#00FF66" font-family="'Courier New', monospace" font-size="30" font-weight="bold" filter="url(#greenGlow)">N</text>
    <!-- E -->
    <rect x="180" y="0" width="50" height="55" rx="4" fill="url(#letterBox)" stroke="#00CC44" stroke-width="1.5"/>
    <text x="205" y="38" text-anchor="middle" fill="#00FF66" font-family="'Courier New', monospace" font-size="30" font-weight="bold" filter="url(#greenGlow)">E</text>
    <!-- Y -->
    <rect x="240" y="0" width="50" height="55" rx="4" fill="url(#letterBox)" stroke="#00CC44" stroke-width="1.5"/>
    <text x="265" y="38" text-anchor="middle" fill="#00FF66" font-family="'Courier New', monospace" font-size="30" font-weight="bold" filter="url(#greenGlow)">Y</text>
  </g>

  <!-- Digit assignment panel (right side) -->
  <g transform="translate(440, 90)">
    <rect x="-10" y="-5" width="140" height="210" rx="6" fill="#0a1a0e" stroke="#00AA00" stroke-width="0.8" opacity="0.5"/>
    <text x="60" y="15" text-anchor="middle" fill="#00CC44" font-family="monospace" font-size="10" opacity="0.7">DIGIT MAP</text>
    <line x1="0" y1="20" x2="120" y2="20" stroke="#00AA00" stroke-width="0.5" opacity="0.3"/>
    <g fill="#00AA00" font-family="monospace" font-size="12" opacity="0.6">
      <text x="10" y="40">S = _</text>
      <text x="10" y="58">E = _</text>
      <text x="10" y="76">N = _</text>
      <text x="10" y="94">D = _</text>
      <text x="10" y="118" fill="#FF6D00" opacity="1">M = ?</text>
      <text x="10" y="136">O = _</text>
      <text x="10" y="154">R = _</text>
      <text x="10" y="172">Y = _</text>
    </g>
    <line x1="0" y1="182" x2="120" y2="182" stroke="#00AA00" stroke-width="0.5" opacity="0.3"/>
    <text x="60" y="198" text-anchor="middle" fill="#00AA00" font-family="monospace" font-size="9" opacity="0.5">8 unique digits</text>
  </g>

  <!-- Question callout -->
  <g transform="translate(300, 325)">
    <rect x="-140" y="-15" width="280" height="30" rx="4" fill="#1a2a1e" stroke="#FF6D00" stroke-width="1" opacity="0.6"/>
    <text x="0" y="5" text-anchor="middle" fill="#FF6D00" font-family="'Courier New', monospace" font-size="14" font-weight="bold" filter="url(#glow)">
      What digit does M represent?
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Bottom hint text -->
  <text x="300" y="365" text-anchor="middle" fill="#338855" font-family="Georgia, serif"
        font-size="11" font-style="italic" opacity="0.7">
    Each letter stands for a unique digit (0-9). No two letters share the same digit.
  </text>
  <text x="300" y="382" text-anchor="middle" fill="#338855" font-family="Georgia, serif"
        font-size="11" font-style="italic" opacity="0.7">
    The addition must be arithmetically correct.
  </text>
</svg>