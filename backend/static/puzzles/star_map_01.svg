<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1e"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Night sky background -->
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Tiny background stars -->
  <circle cx="45" cy="30" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="120" cy="60" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="200" cy="20" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="350" cy="45" r="0.7" fill="#fff" opacity="0.3"/>
  <circle cx="480" cy="25" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="550" cy="70" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="30" cy="150" r="0.6" fill="#fff" opacity="0.2"/>
  <circle cx="570" cy="180" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="90" cy="320" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="510" cy="350" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="280" cy="380" r="0.7" fill="#fff" opacity="0.2"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" fill="#FFD700" font-family="Georgia, serif"
        font-size="18" font-weight="bold" filter="url(#glow)" opacity="0.9">
    ★ THE STAR MAP ★
  </text>

  <!-- Constellation lines (connections between stars) -->
  <g stroke="#4466AA" stroke-width="1.5" opacity="0.6">
    <!-- Triangle A-B-C (top cluster) -->
    <line x1="150" y1="80" x2="300" y2="65"/>
    <line x1="300" y1="65" x2="225" y2="150"/>
    <line x1="225" y1="150" x2="150" y2="80"/>

    <!-- Triangle D-E-F (middle cluster) -->
    <line x1="380" y1="120" x2="480" y2="160"/>
    <line x1="480" y1="160" x2="430" y2="240"/>
    <line x1="430" y1="240" x2="380" y2="120"/>

    <!-- Cross connections -->
    <line x1="225" y1="150" x2="380" y2="120"/>
    <line x1="300" y1="65" x2="380" y2="120"/>

    <!-- Bottom chain G-H-I -->
    <line x1="120" y1="280" x2="250" y2="300"/>
    <line x1="250" y1="300" x2="380" y2="310"/>

    <!-- Vertical links -->
    <line x1="150" y1="80" x2="120" y2="280"/>
    <line x1="430" y1="240" x2="380" y2="310"/>
    <line x1="225" y1="150" x2="250" y2="300"/>

    <!-- The mystery star connection -->
    <line x1="250" y1="300" x2="500" y2="330"/>
    <line x1="380" y1="310" x2="500" y2="330"/>
  </g>

  <!-- Star A: 5 -->
  <circle cx="150" cy="80" r="8" fill="url(#starGlow)"/>
  <circle cx="150" cy="80" r="18" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <text x="150" y="86" text-anchor="middle" fill="#FFD700" font-family="monospace"
        font-size="16" font-weight="bold" filter="url(#glow)">5</text>

  <!-- Star B: 13 -->
  <circle cx="300" cy="65" r="8" fill="url(#starGlow)"/>
  <circle cx="300" cy="65" r="18" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <text x="300" y="71" text-anchor="middle" fill="#FFD700" font-family="monospace"
        font-size="16" font-weight="bold" filter="url(#glow)">13</text>

  <!-- Star C: 8 -->
  <circle cx="225" cy="150" r="8" fill="url(#starGlow)"/>
  <circle cx="225" cy="150" r="18" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <text x="225" y="156" text-anchor="middle" fill="#FFD700" font-family="monospace"
        font-size="16" font-weight="bold" filter="url(#glow)">8</text>

  <!-- Star D: 21 -->
  <circle cx="380" cy="120" r="8" fill="url(#starGlow)"/>
  <circle cx="380" cy="120" r="18" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <text x="380" y="126" text-anchor="middle" fill="#FFD700" font-family="monospace"
        font-size="16" font-weight="bold" filter="url(#glow)">21</text>

  <!-- Star E: 34 -->
  <circle cx="480" cy="160" r="8" fill="url(#starGlow)"/>
  <circle cx="480" cy="160" r="18" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <text x="480" y="166" text-anchor="middle" fill="#FFD700" font-family="monospace"
        font-size="16" font-weight="bold" filter="url(#glow)">34</text>

  <!-- Star F: 55 -->
  <circle cx="430" cy="240" r="8" fill="url(#starGlow)"/>
  <circle cx="430" cy="240" r="18" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <text x="430" y="246" text-anchor="middle" fill="#FFD700" font-family="monospace"
        font-size="16" font-weight="bold" filter="url(#glow)">55</text>

  <!-- Star G: 3 -->
  <circle cx="120" cy="280" r="8" fill="url(#starGlow)"/>
  <circle cx="120" cy="280" r="18" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <text x="120" y="286" text-anchor="middle" fill="#FFD700" font-family="monospace"
        font-size="16" font-weight="bold" filter="url(#glow)">3</text>

  <!-- Star H: 11 -->
  <circle cx="250" cy="300" r="8" fill="url(#starGlow)"/>
  <circle cx="250" cy="300" r="18" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <text x="250" y="306" text-anchor="middle" fill="#FFD700" font-family="monospace"
        font-size="16" font-weight="bold" filter="url(#glow)">11</text>

  <!-- Star I: 19 -->
  <circle cx="380" cy="310" r="8" fill="url(#starGlow)"/>
  <circle cx="380" cy="310" r="18" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <text x="380" y="316" text-anchor="middle" fill="#FFD700" font-family="monospace"
        font-size="16" font-weight="bold" filter="url(#glow)">19</text>

  <!-- Mystery Star J: ? (answer = 23) -->
  <circle cx="500" cy="330" r="12" fill="#FF6D00" opacity="0.3"/>
  <circle cx="500" cy="330" r="8" fill="url(#starGlow)"/>
  <circle cx="500" cy="330" r="20" fill="none" stroke="#FF6D00" stroke-width="1.5" opacity="0.7">
    <animate attributeName="r" values="18;22;18" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="500" y="336" text-anchor="middle" fill="#FF6D00" font-family="monospace"
        font-size="20" font-weight="bold" filter="url(#glow)">?</text>

  <!-- Hint labels (letter identifiers) -->
  <g fill="#8899CC" font-family="Georgia, serif" font-size="10" opacity="0.6">
    <text x="150" y="60">A</text>
    <text x="300" y="48">B</text>
    <text x="225" y="172">C</text>
    <text x="380" y="105">D</text>
    <text x="480" y="145">E</text>
    <text x="430" y="262">F</text>
    <text x="120" y="302">G</text>
    <text x="250" y="322">H</text>
    <text x="380" y="332">I</text>
    <text x="500" y="355">J</text>
  </g>

  <!-- Bottom hint text -->
  <text x="300" y="385" text-anchor="middle" fill="#6677AA" font-family="Georgia, serif"
        font-size="11" font-style="italic" opacity="0.7">
    Each constellation follows a hidden pattern. What number belongs at star J?
  </text>
</svg>
