<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiwimath Question Review Tool</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; }

/* Header */
.header { background: linear-gradient(135deg, #1a1f35, #2d1b4e); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 20px; color: #8be9fd; }
.header .stats { display: flex; gap: 16px; font-size: 13px; }
.header .stat { background: rgba(255,255,255,0.08); padding: 4px 12px; border-radius: 12px; }
.stat-num { color: #50fa7b; font-weight: 700; }

/* Layout */
.container { display: flex; height: calc(100vh - 56px); }

/* Sidebar */
.sidebar { width: 320px; background: #161822; border-right: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; }
.filters { padding: 12px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #333; }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { padding: 4px 10px; border-radius: 14px; border: 1px solid #444; background: transparent; color: #aaa; font-size: 11px; cursor: pointer; transition: all .15s; }
.filter-btn:hover { border-color: #8be9fd; color: #8be9fd; }
.filter-btn.active { background: #8be9fd; color: #0f1117; border-color: #8be9fd; font-weight: 600; }
.filter-btn.flag-active { background: #ff5555; color: white; border-color: #ff5555; }
.search-box { width: 100%; padding: 6px 10px; background: #1e2030; border: 1px solid #444; border-radius: 6px; color: #e0e0e0; font-size: 13px; }
.search-box::placeholder { color: #666; }

/* Question list */
.q-list { flex: 1; overflow-y: auto; }
.q-item { padding: 10px 12px; border-bottom: 1px solid #222; cursor: pointer; transition: background .1s; display: flex; gap: 8px; align-items: flex-start; }
.q-item:hover { background: #1e2030; }
.q-item.selected { background: #1a2744; border-left: 3px solid #8be9fd; }
.q-item.flagged { border-left: 3px solid #ff5555; }
.q-id { font-size: 11px; color: #bd93f9; font-weight: 600; white-space: nowrap; min-width: 52px; }
.q-preview { font-size: 12px; color: #bbb; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.q-badges { display: flex; gap: 3px; flex-shrink: 0; }
.badge { font-size: 9px; padding: 1px 5px; border-radius: 6px; font-weight: 600; }
.badge-easy { background: #0d3320; color: #50fa7b; }
.badge-medium { background: #3a2e0a; color: #f1fa8c; }
.badge-hard { background: #3a0a0a; color: #ff5555; }
.badge-qa { background: #5a0a0a; color: #ff6e6e; font-size: 8px; }

/* Main content */
.main { flex: 1; overflow-y: auto; padding: 24px; }
.detail-card { background: #161822; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #2a2d3e; }
.detail-card h3 { color: #8be9fd; font-size: 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.detail-card h3 .icon { font-size: 16px; }

/* Question display */
.stem-text { font-size: 18px; line-height: 1.6; color: #f8f8f2; margin-bottom: 12px; }
.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.choice { padding: 10px 14px; border-radius: 8px; border: 1px solid #333; font-size: 14px; display: flex; gap: 8px; align-items: center; }
.choice-label { font-weight: 700; color: #bd93f9; }
.choice.correct { background: #0d3320; border-color: #50fa7b; }
.choice.correct .choice-label { color: #50fa7b; }

/* Hints */
.hint-ladder { display: flex; flex-direction: column; gap: 6px; }
.hint-level { padding: 8px 12px; border-radius: 8px; background: #1e2030; font-size: 13px; display: flex; gap: 8px; }
.hint-tag { min-width: 24px; font-weight: 700; font-size: 11px; padding: 2px 6px; border-radius: 4px; text-align: center; }
.hint-tag.l0 { background: #1a3a5c; color: #8be9fd; }
.hint-tag.l1 { background: #0d3a3a; color: #50e6c8; }
.hint-tag.l2 { background: #0d3320; color: #50fa7b; }
.hint-tag.l3 { background: #3a2e0a; color: #f1fa8c; }
.hint-tag.l4 { background: #3a1a0a; color: #ffb86c; }
.hint-tag.l5 { background: #3a0a2a; color: #ff79c6; }

/* Diagnostics */
.diag-item { padding: 6px 10px; border-left: 3px solid #ff5555; margin-bottom: 6px; background: #1e2030; border-radius: 0 6px 6px 0; font-size: 13px; }
.diag-choice { color: #ff5555; font-weight: 600; }

/* Metadata */
.meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; }
.meta-item { background: #1e2030; padding: 8px 12px; border-radius: 6px; }
.meta-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: .5px; }
.meta-value { font-size: 14px; color: #f8f8f2; margin-top: 2px; }

/* QA Panel */
.qa-checks { display: flex; flex-direction: column; gap: 4px; }
.qa-row { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 4px 0; }
.qa-icon { font-size: 16px; }
.qa-pass { color: #50fa7b; }
.qa-fail { color: #ff5555; font-weight: 600; }

/* Flag */
.flag-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #ff5555; background: transparent; color: #ff5555; cursor: pointer; font-size: 12px; transition: all .15s; }
.flag-btn:hover, .flag-btn.flagged { background: #ff5555; color: white; }

/* Empty state */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #666; }
.empty .icon { font-size: 48px; margin-bottom: 12px; }

/* Dashboard */
.dashboard { padding: 24px; }
.dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
.dash-card { background: #161822; border-radius: 10px; padding: 16px; border: 1px solid #2a2d3e; }
.dash-card .num { font-size: 32px; font-weight: 700; }
.dash-card .label { font-size: 12px; color: #888; margin-top: 4px; }
.dash-card.green .num { color: #50fa7b; }
.dash-card.yellow .num { color: #f1fa8c; }
.dash-card.red .num { color: #ff5555; }
.dash-card.blue .num { color: #8be9fd; }
.dash-card.purple .num { color: #bd93f9; }

.topic-breakdown { width: 100%; border-collapse: collapse; }
.topic-breakdown th { text-align: left; padding: 8px 12px; color: #888; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #333; }
.topic-breakdown td { padding: 8px 12px; border-bottom: 1px solid #222; font-size: 13px; }
.bar-container { width: 100px; height: 6px; background: #333; border-radius: 3px; display: inline-block; vertical-align: middle; margin-left: 6px; }
.bar-fill { height: 100%; border-radius: 3px; }

/* Nav tabs */
.nav-tabs { display: flex; gap: 0; background: #161822; border-bottom: 1px solid #333; }
.nav-tab { padding: 10px 20px; cursor: pointer; font-size: 13px; color: #888; border-bottom: 2px solid transparent; transition: all .15s; }
.nav-tab:hover { color: #e0e0e0; }
.nav-tab.active { color: #8be9fd; border-bottom-color: #8be9fd; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <h1>🥝 Kiwimath Question Review Tool</h1>
  <div class="stats">
    <span class="stat">Total: <span class="stat-num" id="totalCount">800</span></span>
    <span class="stat">Flagged: <span class="stat-num" id="flagCount" style="color:#ff5555">0</span></span>
    <span class="stat">QA Issues: <span class="stat-num" id="qaCount" style="color:#f1fa8c">0</span></span>
  </div>
</div>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="showView('review')">Review Questions</div>
  <div class="nav-tab" onclick="showView('dashboard')">Dashboard</div>
  <div class="nav-tab" onclick="showView('qa')">QA Report</div>
</div>

<div id="reviewView" class="container">
  <div class="sidebar">
    <div class="filters">
      <input type="text" class="search-box" placeholder="Search questions..." id="searchBox" oninput="applyFilters()">
      <div class="filter-row" id="topicFilters"></div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="toggleDiff(this,'all')" data-diff="all">All</button>
        <button class="filter-btn" onclick="toggleDiff(this,'easy')" data-diff="easy">Easy</button>
        <button class="filter-btn" onclick="toggleDiff(this,'medium')" data-diff="medium">Medium</button>
        <button class="filter-btn" onclick="toggleDiff(this,'hard')" data-diff="hard">Hard</button>
      </div>
      <div class="filter-row">
        <button class="filter-btn" onclick="toggleSpecial(this,'flagged')">🚩 Flagged</button>
        <button class="filter-btn" onclick="toggleSpecial(this,'qa-issues')">⚠️ QA Issues</button>
        <button class="filter-btn" onclick="toggleSpecial(this,'no-svg')">🖼️ No SVG</button>
      </div>
    </div>
    <div class="q-list" id="qList"></div>
  </div>
  <div class="main" id="mainContent">
    <div class="empty"><div class="icon">📋</div><div>Select a question from the list to review</div></div>
  </div>
</div>

<div id="dashboardView" class="dashboard" style="display:none"></div>
<div id="qaView" class="dashboard" style="display:none"></div>

// State
let flagged = new Set();
let currentFilter = { topic: 'all', diff: 'all', special: null, search: '' };
let filtered = [...ALL_QUESTIONS];
let selectedIdx = null;

// QA checks per question
function runQA(q) {
  const issues = [];
  if (!q.stem.trim().endsWith('?')) issues.push('Missing question mark');
  const uniqueChoices = new Set(q.choices.map(c => c.toString().trim().toLowerCase()));
  if (uniqueChoices.size < q.choices.length) issues.push('Duplicate options');
  if (!q.visual_svg) issues.push('No SVG visual');
  if (!q.hint || Object.keys(q.hint).length < 6) issues.push('Incomplete hint ladder');
  if (q.correct_answer < 0 || q.correct_answer >= q.choices.length) issues.push('Invalid correct answer index');
  const diagKeys = Object.keys(q.diagnostics || {});
  if (diagKeys.length < 3) issues.push('Missing diagnostics for some wrong answers');
  // Check if all choices are non-empty
  if (q.choices.some(c => !c || c.toString().trim() === '')) issues.push('Empty choice option');
  return issues;
}

// Pre-compute QA
ALL_QUESTIONS.forEach(q => { q._qa = runQA(q); });

// Build topic filters
const topics = [...new Set(ALL_QUESTIONS.map(q => q._topic_display))];
const topicFiltersEl = document.getElementById('topicFilters');
topicFiltersEl.innerHTML = '<button class="filter-btn active" onclick="toggleTopic(this,\'all\')" data-topic="all">All Topics</button>' +
  topics.map(t => {
    const short = t.split('&')[0].trim().split(' ').slice(0,2).join(' ');
    return `<button class="filter-btn" onclick="toggleTopic(this,'${t}')" data-topic="${t}">${short}</button>`;
  }).join('');

function toggleTopic(el, topic) {
  currentFilter.topic = topic;
  topicFiltersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function toggleDiff(el, diff) {
  currentFilter.diff = diff;
  el.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function toggleSpecial(el, type) {
  if (currentFilter.special === type) {
    currentFilter.special = null;
    el.classList.remove('flag-active');
  } else {
    el.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('flag-active'));
    currentFilter.special = type;
    el.classList.add('flag-active');
  }
  applyFilters();
}

function applyFilters() {
  const s = document.getElementById('searchBox').value.toLowerCase();
  currentFilter.search = s;
  
  filtered = ALL_QUESTIONS.filter(q => {
    if (currentFilter.topic !== 'all' && q._topic_display !== currentFilter.topic) return false;
    if (currentFilter.diff !== 'all' && q.difficulty_tier !== currentFilter.diff) return false;
    if (currentFilter.special === 'flagged' && !flagged.has(q.id)) return false;
    if (currentFilter.special === 'qa-issues' && q._qa.length === 0) return false;
    if (currentFilter.special === 'no-svg' && q.visual_svg) return false;
    if (s && !q.stem.toLowerCase().includes(s) && !q.id.toLowerCase().includes(s)) return false;
    return true;
  });

  renderList();
}

function renderList() {
  const list = document.getElementById('qList');
  list.innerHTML = filtered.map((q, i) => {
    const cls = [
      'q-item',
      selectedIdx === i ? 'selected' : '',
      flagged.has(q.id) ? 'flagged' : ''
    ].filter(Boolean).join(' ');
    const qaB = q._qa.length > 0 ? `<span class="badge badge-qa">${q._qa.length}</span>` : '';
    return `<div class="${cls}" onclick="selectQ(${i})">
      <span class="q-id">${q.id}</span>
      <span class="q-preview">${q.stem.substring(0, 60)}...</span>
      <span class="q-badges">
        <span class="badge badge-${q.difficulty_tier}">${q.difficulty_tier[0].toUpperCase()}</span>
        ${qaB}
      </span>
    </div>`;
  }).join('');
  document.getElementById('totalCount').textContent = filtered.length;
}

function selectQ(idx) {
  selectedIdx = idx;
  const q = filtered[idx];
  renderDetail(q);
  renderList();
}

function renderDetail(q) {
  const main = document.getElementById('mainContent');
  const isFlagged = flagged.has(q.id);
  
  // Choices
  const choicesHtml = q.choices.map((c, i) => {
    const label = String.fromCharCode(65 + i);
    const cls = i === q.correct_answer ? 'choice correct' : 'choice';
    return `<div class="${cls}"><span class="choice-label">${label}</span> ${c}${i === q.correct_answer ? ' ✓' : ''}</div>`;
  }).join('');

  // Hints
  const hintLevels = ['level_0','level_1','level_2','level_3','level_4','level_5'];
  const hintNames = ['Pause','Attention','Thinking Q','Scaffold','Guided','Teach'];
  const hintsHtml = hintLevels.map((k, i) => {
    const text = q.hint ? q.hint[k] || '—' : '—';
    return `<div class="hint-level"><span class="hint-tag l${i}">L${i}</span><span>${hintNames[i]}: ${text}</span></div>`;
  }).join('');

  // Diagnostics
  const diagHtml = Object.entries(q.diagnostics || {}).filter(([k]) => parseInt(k) !== q.correct_answer).map(([k, v]) => {
    const label = String.fromCharCode(65 + parseInt(k));
    return `<div class="diag-item"><span class="diag-choice">${label}:</span> ${v}</div>`;
  }).join('');

  // QA Checks
  const allChecks = [
    { name: 'Question mark', pass: q.stem.trim().endsWith('?') },
    { name: 'Unique choices', pass: new Set(q.choices.map(c=>c.toString().trim().toLowerCase())).size === q.choices.length },
    { name: 'Has SVG visual', pass: !!q.visual_svg },
    { name: 'Complete hints (6 levels)', pass: q.hint && Object.keys(q.hint).length >= 6 },
    { name: 'Valid correct answer', pass: q.correct_answer >= 0 && q.correct_answer < q.choices.length },
    { name: 'Diagnostics for wrong answers', pass: Object.keys(q.diagnostics || {}).length >= 3 },
    { name: 'Non-empty choices', pass: !q.choices.some(c => !c || c.toString().trim() === '') },
    { name: 'Difficulty calibrated (1-100)', pass: q.difficulty_score >= 1 && q.difficulty_score <= 100 },
  ];
  const qaHtml = allChecks.map(c => 
    `<div class="qa-row"><span class="qa-icon">${c.pass ? '✅' : '❌'}</span><span class="${c.pass ? 'qa-pass' : 'qa-fail'}">${c.name}</span></div>`
  ).join('');

  main.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div>
        <span style="color:#bd93f9;font-size:20px;font-weight:700">${q.id}</span>
        <span style="margin-left:12px;color:#888;font-size:13px">${q._topic_display}</span>
        <span class="badge badge-${q.difficulty_tier}" style="margin-left:8px;font-size:11px;padding:2px 8px">${q.difficulty_tier} (${q.difficulty_score})</span>
      </div>
      <button class="flag-btn ${isFlagged ? 'flagged' : ''}" onclick="toggleFlag('${q.id}')">🚩 ${isFlagged ? 'Unflag' : 'Flag for Review'}</button>
    </div>

    <div class="detail-card">
      <h3><span class="icon">📝</span> Question</h3>
      <div class="stem-text">${q.stem}</div>
      ${q.original_stem && q.original_stem !== q.stem ? `<div style="font-size:12px;color:#666;margin-top:8px">Original: ${q.original_stem}</div>` : ''}
      <div class="choices" style="margin-top:12px">${choicesHtml}</div>
    </div>

    ${q.visual_svg ? `<div class="detail-card"><h3><span class="icon">🖼️</span> SVG Visual</h3><div style="background:#fff;border-radius:8px;padding:12px;text-align:center">${q.visual_svg}</div></div>` : ''}

    <div class="detail-card">
      <h3><span class="icon">💡</span> Socratic Hint Ladder</h3>
      <div class="hint-ladder">${hintsHtml}</div>
    </div>

    <div class="detail-card">
      <h3><span class="icon">🔍</span> Wrong Answer Diagnostics</h3>
      ${diagHtml || '<div style="color:#666">No diagnostics available</div>'}
    </div>

    <div class="detail-card">
      <h3><span class="icon">✅</span> QA Checklist (10-Point)</h3>
      <div class="qa-checks">${qaHtml}</div>
    </div>

    <div class="detail-card">
      <h3><span class="icon">📊</span> Metadata</h3>
      <div class="meta-grid">
        <div class="meta-item"><div class="meta-label">Topic ID</div><div class="meta-value">${q.topic}</div></div>
        <div class="meta-item"><div class="meta-label">Difficulty Score</div><div class="meta-value">${q.difficulty_score} / 100</div></div>
        <div class="meta-item"><div class="meta-label">Difficulty Tier</div><div class="meta-value">${q.difficulty_tier}</div></div>
        <div class="meta-item"><div class="meta-label">Tags</div><div class="meta-value">${(q.tags || []).join(', ')}</div></div>
        <div class="meta-item"><div class="meta-label">Folder</div><div class="meta-value">${q._topic_folder}</div></div>
        <div class="meta-item"><div class="meta-label">Has Visual</div><div class="meta-value">${q.visual_svg ? 'Yes' : 'No'}</div></div>
      </div>
    </div>
  `;
}

function toggleFlag(id) {
  if (flagged.has(id)) flagged.delete(id); else flagged.add(id);
  document.getElementById('flagCount').textContent = flagged.size;
  if (selectedIdx !== null) selectQ(selectedIdx);
  renderList();
}

// Dashboard view
function renderDashboard() {
  const qaIssueCount = ALL_QUESTIONS.filter(q => q._qa.length > 0).length;
  const noSvg = ALL_QUESTIONS.filter(q => !q.visual_svg).length;
  const noQMark = ALL_QUESTIONS.filter(q => !q.stem.trim().endsWith('?')).length;
  
  document.getElementById('qaCount').textContent = qaIssueCount;

  const topicStats = topics.map(t => {
    const qs = ALL_QUESTIONS.filter(q => q._topic_display === t);

    const issues = qs.filter(q => q._qa.length > 0).length;
    const svgs = qs.filter(q => q.visual_svg).length;

  document.getElementById('dashboardView').innerHTML = `

        ${topicStats.map(t => `
          <tr>
            <td>${t.name}</td>
            <td>${t.total}</td>
            <td style="color:#50fa7b">${t.easy}</td>
            <td style="color:#f1fa8c">${t.med}</td>
            <td style="color:#ff5555">${t.hard}</td>
            <td>${t.svgs}/${t.total}</td>
            <td style="color:${t.issues > 0 ? '#ff5555' : '#50fa7b'}">${t.issues}</td>
            <td>
              <div class="bar-container">
                <div class="bar-fill" style="width:${t.easy/t.total*100}%;background:#50fa7b;display:inline-block;height:100%;border-radius:3px 0 0 3px"></div><div class="bar-fill" style="width:${t.med/t.total*100}%;background:#f1fa8c;display:inline-block;height:100%"></div><div class="bar-fill" style="width:${t.hard/t.total*100}%;background:#ff5555;display:inline-block;height:100%;border-radius:0 3px 3px 0"></div>
              </div>
            </td>
          </tr>
        `).join('')}
      </table>
    </div>

    <div class="detail-card" style="margin-top:16px">
      <h3 style="color:#8be9fd">Content Targets vs Current</h3>
      <table class="topic-breakdown">
        <tr><th>Metric</th><th>Current</th><th>Target (G1-G2)</th><th>Gap</th></tr>
        <tr><td>Questions per topic</td><td>100</td><td>300</td><td style="color:#ff5555">-200</td></tr>
        <tr><td>Total questions</td><td>800</td><td>2,400</td><td style="color:#ff5555">-1,600</td></tr>
        <tr><td>SVG coverage</td><td>${800 - noSvg}/800 (${Math.round((800-noSvg)/800*100)}%)</td><td>100%</td><td style="color:#f1fa8c">${noSvg} missing</td></tr>
        <tr><td>QA clean rate</td><td>${Math.round((800-qaIssueCount)/800*100)}%</td><td>100%</td><td style="color:#f1fa8c">${qaIssueCount} to fix</td></tr>
      </table>
    </div>
  `;

// QA Report view
function renderQAReport() {
  const issueTypes = {};
  ALL_QUESTIONS.forEach(q => {
    q._qa.forEach(issue => {
      if (!issueTypes[issue]) issueTypes[issue] = [];
      issueTypes[issue].push(q);
    });
  });

  document.getElementById('qaView').innerHTML = `
    <h2 style="color:#8be9fd;margin-bottom:20px">QA Report — All Issues</h2>
    ${Object.entries(issueTypes).sort((a,b) => b[1].length - a[1].length).map(([issue, qs]) => `
      <div class="detail-card" style="margin-bottom:12px">
        <h3 style="color:#ff5555"><span class="icon">⚠️</span> ${issue} (${qs.length} questions)</h3>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">
          ${qs.slice(0, 50).map(q => `<span style="font-size:11px;background:#1e2030;padding:2px 8px;border-radius:4px;color:#bd93f9;cursor:pointer" onclick="showView('review');jumpToQ('${q.id}')">${q.id}</span>`).join('')}
          ${qs.length > 50 ? `<span style="font-size:11px;color:#666">...and ${qs.length - 50} more</span>` : ''}
        </div>
      </div>
    `).join('')}
    ${Object.keys(issueTypes).length === 0 ? '<div class="detail-card"><h3 style="color:#50fa7b">✅ All questions pass QA checks!</h3></div>' : ''}
  `;
}

function jumpToQ(id) {
  currentFilter = { topic: 'all', diff: 'all', special: null, search: id };
  document.getElementById('searchBox').value = id;
  applyFilters();
  if (filtered.length > 0) selectQ(0);
}

function showView(view) {
  document.querySelectorAll('.nav-tab').forEach((t, i) => {
    t.classList.toggle('active', 
      (view === 'review' && i === 0) || (view === 'dashboard' && i === 1) || (view === 'qa' && i === 2));
  });
  document.getElementById('reviewView').style.display = view === 'review' ? 'flex' : 'none';
  document.getElementById('dashboardView').style.display = view === 'dashboard' ? 'block' : 'none';
  document.getElementById('qaView').style.display = view === 'qa' ? 'block' : 'none';
  if (view === 'dashboard') renderDashboard();
  if (view === 'qa') renderQAReport();
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowDown' && selectedIdx !== null && selectedIdx < filtered.length - 1) {
    selectQ(selectedIdx + 1);
    document.querySelector('.q-item.selected')?.scrollIntoView({ block: 'nearest' });
  }
  if (e.key === 'ArrowUp' && selectedIdx !== null && selectedIdx > 0) {
    selectQ(selectedIdx - 1);
    document.querySelector('.q-item.selected')?.scrollIntoView({ block: 'nearest' });
  }
  if (e.key === 'f') toggleFlag(filtered[selectedIdx]?.id);
});

// Init
renderList();
renderDashboard();
</script>
</body>
</html>
